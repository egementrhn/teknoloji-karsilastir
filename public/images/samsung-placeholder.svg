<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="100%" height="100%">
  <!-- Samsung sharp corners body -->
  <rect x="25" y="20" width="150" height="360" rx="5" fill="#e2e8f0" stroke="#94a3b8" strokeWidth="4"/>
  <rect x="30" y="25" width="140" height="350" rx="2" fill="#000000"/>
  
  <!-- Samsung Logo Text Approximation -->
  <text x="100" y="200" fill="#ffffff" fontSize="12" fontWeight="bold" textAnchor="middle" opacity="0.7" fontFamily="Arial">SAMSUNG</text>
  
  <!-- Camera Module (Vertical array) -->
  <circle cx="50" cy="50" r="8" fill="#334155"/>
  <circle cx="50" cy="75" r="8" fill="#334155"/>
  <circle cx="50" cy="100" r="8" fill="#334155"/>
  <circle cx="50" cy="125" r="5" fill="#334155"/>
</svg>
